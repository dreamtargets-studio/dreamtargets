<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawn of the Unread | Little Boxes</title>
<link rel="stylesheet" href="chassis.css">
<link rel="stylesheet" href="destination.css">
<link rel="stylesheet" href="gallery.css">
<link rel="stylesheet" href="theatre.css">
<link rel="stylesheet" href="magazine.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="content-page">

<header id="main-nav"></header>

<main class="editorial-post">
  <div class="paper-sheet">
    <div class="comic-reader-wrap">

      <!-- Chevrons -->
      <button class="comic-chevron comic-chevron-prev hidden" id="chevron-prev" aria-label="Previous page">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="comic-chevron comic-chevron-next hidden" id="chevron-next" aria-label="Next page">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      </button>

      <!-- Reader -->
      <div class="comic-reader" id="comic-reader">
        <div class="comic-track" id="comic-track">
          <div class="comic-panel" id="panel-prev"></div>
          <div class="comic-panel" id="panel-current"></div>
          <div class="comic-panel" id="panel-next"></div>
        </div>
      </div>

    </div>
  </div>
</main>

<footer id="main-footer"></footer>
<script src="loader.js"></script>

<script>
(function () {

  // ── CONFIGURATION ──────────────────────────────────────────────
  // Edit these three values for each title / issue
  var PREFIX      = 'dotu';   // filename prefix
  var ISSUE       = '04';     // issue number (two digits)
  var TOTAL_PAGES = 11;       // total pages including cover, synopsis, video
  // ──────────────────────────────────────────────────────────────

  // ── HOTSPOT DATA ──────────────────────────────────────────────
  // Add hotspot data for each page here.
  // Key is the page number (integer). Value is an array of hotspot objects.
  // Each hotspot: { cx, cy, r, href, marker }
  //   cx, cy — centre as percentage of image width/height
  //   r      — radius as percentage of image width
  //   href   — destination URL or # placeholder
  //   marker — true if hotspot-marker.png should appear
  var HOTSPOTS = {
    1: [
      { cx: 87.234, cy: 59.176, r: 5.319, href: '#', marker: false }
    ]
    // Add further pages as needed:
    // 2: [ { cx: 50, cy: 50, r: 5, href: 'page.html', marker: true } ]
  };
  // ──────────────────────────────────────────────────────────────

  var track        = document.getElementById('comic-track');
  var panelPrev    = document.getElementById('panel-prev');
  var panelCurrent = document.getElementById('panel-current');
  var panelNext    = document.getElementById('panel-next');
  var chevPrev     = document.getElementById('chevron-prev');
  var chevNext     = document.getElementById('chevron-next');

  var currentPage  = 1;
  var isAnimating  = false;

  // ── FILENAME BUILDER ──
  function filename(page) {
    return PREFIX + '-' + ISSUE + '-' + String(page).padStart(2, '0') + '.jpg';
  }

  // ── BUILD PANEL HTML ──
  function buildPanel(page) {
    if (page < 1 || page > TOTAL_PAGES) return '';
    var src = 'assets/img/' + filename(page);
    var mapName = 'image-map-' + page;
    var spots = HOTSPOTS[page] || [];

    var areas = spots.map(function (s, i) {
      return '<area id="hs-' + page + '-' + (i+1) + '" shape="circle"' +
        ' data-cx="' + s.cx + '" data-cy="' + s.cy + '" data-r="' + s.r + '"' +
        ' href="' + s.href + '" alt="hotspot" title="hotspot">';
    }).join('');

    var markers = spots.filter(function (s) { return s.marker; }).map(function (s) {
      return '<img src="assets/img/hotspot-marker.png" class="hotspot-marker"' +
        ' data-cx="' + s.cx + '" data-cy="' + s.cy + '" alt="" aria-hidden="true">';
    }).join('');

    return '<div class="imagemap-container" id="imc-' + page + '">' +
      '<img src="' + src + '" alt="Page ' + page + '" usemap="#' + mapName + '" id="img-' + page + '">' +
      '<map name="' + mapName + '" id="' + mapName + '">' + areas + '</map>' +
      markers +
      '</div>';
  }

  // ── POSITION OVERLAYS FOR A PANEL ──
  function positionOverlays(page) {
    var imc = document.getElementById('imc-' + page);
    if (!imc) return;
    var img = document.getElementById('img-' + page);
    if (!img || !img.complete || img.naturalWidth === 0) {
      img && img.addEventListener('load', function () { positionOverlays(page); }, { once: true });
      return;
    }

    var w = img.offsetWidth;
    var h = img.offsetHeight;

    var old = imc.querySelectorAll('.imagemap-overlay');
    old.forEach(function (el) { el.remove(); });

    var mapName = 'image-map-' + page;
    var map = document.getElementById(mapName);
    if (!map) return;

    map.querySelectorAll('area').forEach(function (area) {
      var cxPct = parseFloat(area.getAttribute('data-cx'));
      var cyPct = parseFloat(area.getAttribute('data-cy'));
      var rPct  = parseFloat(area.getAttribute('data-r'));
      var href  = area.getAttribute('href');
      var id    = area.getAttribute('id');

      var cx = Math.round(cxPct / 100 * w);
      var cy = Math.round(cyPct / 100 * h);
      var r  = Math.round(rPct  / 100 * w);

      area.setAttribute('coords', cx + ',' + cy + ',' + r);

      var a = document.createElement('a');
      a.className = 'imagemap-overlay';
      a.setAttribute('href', href);
      a.setAttribute('aria-label', id);
      a.style.left   = cx + 'px';
      a.style.top    = cy + 'px';
      a.style.width  = (r * 2) + 'px';
      a.style.height = (r * 2) + 'px';
      imc.appendChild(a);
    });

    imc.querySelectorAll('.hotspot-marker').forEach(function (marker) {
      var cxPct = parseFloat(marker.getAttribute('data-cx'));
      var cyPct = parseFloat(marker.getAttribute('data-cy'));
      marker.style.left = Math.round(cxPct / 100 * w) + 'px';
      marker.style.top  = Math.round(cyPct / 100 * h) + 'px';
    });
  }

  // ── RENDER THREE PANELS ──
  function renderPanels(page) {
    panelPrev.innerHTML    = buildPanel(page - 1);
    panelCurrent.innerHTML = buildPanel(page);
    panelNext.innerHTML    = buildPanel(page + 1);

    track.classList.add('no-transition');
    track.style.transform = 'translateX(-33.333%)';
    track.offsetHeight;
    track.classList.remove('no-transition');

    positionOverlays(page - 1);
    positionOverlays(page);
    positionOverlays(page + 1);

    updateChevrons(page);
    updateTitle(page);
  }

  // ── UPDATE CHEVRONS ──
  function updateChevrons(page) {
    chevPrev.classList.toggle('hidden', page <= 1);
    chevNext.classList.toggle('hidden', page >= TOTAL_PAGES);
  }

  // ── UPDATE PAGE TITLE ──
  function updateTitle(page) {
    document.title = 'Issue ' + ISSUE + ' — Page ' + page + ' | Dawn of the Unread';
  }

  // ── NAVIGATE ──
  function goTo(direction) {
    if (isAnimating) return;
    var targetPage = currentPage + direction;
    if (targetPage < 1 || targetPage > TOTAL_PAGES) return;

    isAnimating = true;
    var translateX = direction === 1 ? '-66.666%' : '0%';
    track.style.transform = 'translateX(' + translateX + ')';

    track.addEventListener('transitionend', function onEnd() {
      track.removeEventListener('transitionend', onEnd);
      currentPage = targetPage;
      renderPanels(currentPage);
      isAnimating = false;
    });
  }

  // ── CHEVRON CLICKS ──
  chevPrev.addEventListener('click', function () { goTo(-1); });
  chevNext.addEventListener('click', function () { goTo(1); });

  // ── KEYBOARD ──
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(-1);
  });

  // ── SWIPE ──
  var touchStartX = 0;
  var touchStartY = 0;
  var swipeThreshold = 40;

  document.getElementById('comic-reader').addEventListener('touchstart', function (e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.getElementById('comic-reader').addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > swipeThreshold) {
      goTo(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // ── RESIZE ──
  window.addEventListener('resize', function () {
    positionOverlays(currentPage - 1);
    positionOverlays(currentPage);
    positionOverlays(currentPage + 1);
  });

  // ── INIT ──
  renderPanels(currentPage);

})();
</script>

</body>
</html>
