<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="version" content="DIGITAL STORYTELLING OS v8.5 - THEATRE MODULE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Theatre | Thinkamigo</title>
    
    <link rel="stylesheet" href="chassis.css">
    <link rel="stylesheet" href="theatre.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="content-page">

    <header id="main-nav"></header>

    <main class="theatre-env"> 
        
        <div class="theatre-grid-charcoal">
            
            <div class="chassis-container">
            
                <section class="video-theatre-grid">
                    
                    <article class="theatre-card" data-video="VIMEO_ID_HERE">
                        <div class="theatre-thumb">
                            <img src="img/thumb.jpg" alt="Film Title">
                            <div class="play-button-overlay"></div>
                        </div>
                        <div class="theatre-caption">
                            <p class="theatre-desc">Enter a discrete description of the film here. Keep it to 2-3 lines to maintain grid alignment.</p>
                            <div class="theatre-actions">
                                <span class="res-link">Watch Film</span>
                            </div>
                        </div>
                    </article>

                    </section>

            </div> </div> </main>
    
    <footer id="main-footer"></footer>

    <script src="loader.js"></script>

</body>
</html>
