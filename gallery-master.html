<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Page | ThinkAmigo</title>
    
    <link rel="stylesheet" href="chassis.css">
    <link rel="stylesheet" href="destination.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body class="content-page">

    <nav id="main-nav">
        </nav>

    <div class="story-hero-wrapper">
        <img src="images/hero-service.jpg" alt="Service Hero" class="panoramic-hero">
    </div>

    <main class="paper-sheet">
        <article class="text-rail">
            
            <h1>Service Title</h1>
            <div class="orange-rule"></div>
            <h2>Subtitle or Intro Sentence</h2>

            <p>High-level introduction to the service...</p>

            <div class="gallery-grid-3">
                <figure>
                    <img src="images/img1.jpg" alt="Task A">
                    <div class="caption">Context for image one.</div>
                </figure>
                <figure>
                    <img src="images/img2.jpg" alt="Task B">
                    <div class="caption">Context for image two.</div>
                </figure>
                <figure>
                    <img src="images/img3.jpg" alt="Task C">
                    <div class="caption">Context for image three.</div>
                </figure>
            </div>

            <blockquote>
                <p>I design impactful digital products and services that bridge the gap between business objectives and user needs.</p>
                <footer>Paul Fillingham</footer>
            </blockquote>

            <h3>Next Steps</h3>
            <p>Final call to action text...</p>

        </article>
    </main>

</body>
</html>
