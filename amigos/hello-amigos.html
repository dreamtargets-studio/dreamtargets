<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos | Thinkamigo</title>

    <link rel="stylesheet" href="../chassis.css">
    <link rel="stylesheet" href="../destination.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="content-page" data-base="../">

    <header id="main-nav"></header>

    <main class="editorial-post">
        <div class="paper-sheet">
            <article class="text-rail">
                <header>
                    <h1>Amigos</h1>
                    <div class="orange-rule"></div>
                    <h2>Studio resources for collaborators</h2>
                </header>
                <div class="contact-form-refined">
                    <div class="form-group">
                        <label for="password-input">Password</label>
                        <input
                            type="password"
                            id="password-input"
                            placeholder="Enter password"
                            autocomplete="current-password"
                        >
                    </div>
                    <p id="gate-error" style="color: var(--brand-orange); font-size: 14px; min-height: 20px; margin-bottom: 16px;"></p>
                    <button type="button" class="btn-pill" id="gate-btn">Enter</button>
                </div>
            </article>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="../loader.js"></script>

</body>
</html>
