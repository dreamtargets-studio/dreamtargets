<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Archive | Thinkamigo</title>
    
    <link rel="stylesheet" href="chassis.css">
    <link rel="stylesheet" href="destination.css">
    <link rel="stylesheet" href="gallery.css">

    <style>
        /* THE CINEMATIC THEME OVERRIDE */
        body { background-color: #050505; color: #ccc; }
        .paper-sheet { background-color: #0a0a0a; border: 1px solid #222; box-shadow: none; }
        .text-rail h1, .text-rail h2 { color: #fff; }
        .text-rail p { color: #999; }
        .orange-rule { opacity: 0.8; }
        .rule-grey-paper { background-color: #222; }
    </style>
</head>
<body class="content-page">

    <nav id="main-nav"></nav>

    <main class="paper-sheet">
        
        <section class="story-hero-wrapper">
            <img src="assets/img/placeholder-cinematic-1280x414.jpg" 
                 alt="Video Archive Hero" 
                 class="panoramic-hero" 
                 style="filter: brightness(0.6);">
        </section>

        <article class="text-rail">
            <h1>Motion & Industrial Film</h1>
            <div class="orange-rule"></div>
            
            <p>Introductory text regarding your film and video work goes here. This page uses a dark theme to prioritize the cinematic quality of the thumbnails.</p>

            <div class="video-grid-4">
                
                <div class="video-item" data-video-id="dQw4w9WgXcQ" data-platform="youtube">
                    <img src="assets/img/video-thumb-01-640x360.jpg" alt="Video Project 01 Caption">
                    <div class="play-button-overlay"></div>
                </div>

                <div class="video-item" data-video-id="148751763" data-platform="vimeo">
                    <img src="assets/img/video-thumb-02-640x360.jpg" alt="Video Project 02 Caption">
                    <div class="play-button-overlay"></div>
                </div>

                <div class="video-item" data-video-id="ID_3" data-platform="youtube">
                    <img src="assets/img/video-thumb-03-640x360.jpg" alt="Video Project 03 Caption">
                    <div class="play-button-overlay"></div>
                </div>

                <div class="video-item" data-video-id="ID_4" data-platform="youtube">
                    <img src="assets/img/video-thumb-04-640x360.jpg" alt="Video Project 04 Caption">
                    <div class="play-button-overlay"></div>
                </div>

            </div>
            <p>Closing text or credits for the video section.</p>
            
        </article>
    </main>

    <footer id="main-footer"></footer>
    
    <script src="loader.js"></script>

</body>
</html>
