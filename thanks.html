<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Thinkamigo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. Hides the contact button in the global footer */
        .footer-cta { display: none !important; }

/* 2. Refined Nav-Blue Pill Button */
        .btn-pill.refine-btn {
            /* Using the precise Nav-Bar Blue Hex to eliminate optical illusions */
            background-color: #1a4b8c !important; 
            color: #ffffff !important;
            border-radius: 50px !important;
            padding: 12px 40px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.3s ease;
            border: none;
            -webkit-appearance: none; /* Removes mobile-specific shading */
            box-shadow: none;         /* Ensures a flat, clean color match */
        }

        .btn-pill.refine-btn:hover {
            opacity: 0.9;
            color: #ffffff !important;
        }
    </style>
</head>
<body>

   <header id="main-nav"></header>

    <main class="editorial-post">
    <div class="paper-sheet cinematic-dock">
        <div class="container">
            <article class="text-rail" style="padding: 120px 0;">
                
                <h1>Message Sent</h1>
                <div class="orange-rule" style="margin: 20px 0;"></div> 
                
                <p style="font-size: 1.2rem; margin-top: 30px;">Thank you for getting in touch.</p>
                <p>I have received your inquiry and will review the details shortly.</p>

                <div style="margin-top: 50px;">
                    <a href="index.html" class="btn-pill refine-btn">
                        Return Home
                    </a>
                </div>

            </article>
        </div>
    </div>
</main>

   <footer id="main-footer"></footer>

    <script src="loader.js"></script>
</body>
</html>
