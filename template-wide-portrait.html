<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Gallery Template | Thinkamigo</title>
    <link rel="stylesheet" href="style.css">
                    
    <style>
        .content-column-narrow {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }
    </style> 
</head>
<body class="content-page" style="background-color: #f0ead6; margin: 0; padding: 0;">

   <header id="main-nav"></header>

<main class="editorial-post">
    <div class="paper-sheet cinematic-dock">
        
        <section class="story-hero-wrapper">
            <img src="assets/img/page-planning.jpg" alt="Digital Design Hero" class="panoramic-hero">
        </section>

        <article class="text-rail">
            <header>
                <h1>Gallery title</h1>
                <div class="orange-rule"></div>
                <h2>Gallery subtitle</h2>
            </header>                
        </article>

        <section class="archive-section-wrap">
            <div class="archive-grid portrait-5">
                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                        data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                        data-gallery="portraits" 
                        alt="Portrait Layout Test 1">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" 
                         alt="Portrait Layout Test 2">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" 
                         alt="Portrait Layout Test 3">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" 
                         alt="Portrait Layout Test 4">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" 
                         alt="Portrait Layout Test 5">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" alt="Portrait Layout Test 6">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" alt="Portrait Layout Test 7">
                    </div>
                </article>

                <article class="archive-item">
                    <div class="frame-portrait"><img src="assets/img/placeholder-portrait-300x425.jpg" 
                         data-full="assets/img/placeholder-portrait-1190x1684.jpg" 
                         data-gallery="portraits" 
                         alt="Portrait Layout Test 8">
                    </div>
                </article>
            </div>
        </section>

        <div class="rule-grey-full"></div>

        <section class="text-rail" style="padding-bottom: 80px;">
            <h3>Links</h3>
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 15px;"><a href="https://sillitoetrail.com/" target="_blank" style="color: #0056b3; text-decoration: none; border-bottom: 1px solid #ccc;">The Sillitoe Trail website</a></li>
            </ul>
        </section>
    </div>
</main>

<footer id="main-footer"></footer>
   
<div id="lightbox-overlay">
    <span class="lightbox-close"></span>

    <span class="lightbox-prev"></span>
    <span class="lightbox-next"></span>

    <img class="lightbox-content" id="lightbox-img" src="">

    <div class="lightbox-info">
        <div class="text-group">
            <div id="lightbox-caption" class="lightbox-caption"></div>
            <div id="lightbox-counter" class="lightbox-counter"></div>
        </div>
    </div>
</div>
<script src="loader.js"></script>
</body>
</html>
